<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shadowverse Nightmare Token Counter β</title>

<style>

body{
    font-family:sans-serif;
    text-align:center;
    margin:20px;
    max-width:700px;
    margin-left:auto;
    margin-right:auto;
}

.token-card{
    border:1px solid #ccc;
    border-radius:10px;
    padding:15px;
    margin:15px 0;
}

.count{
    font-size:32px;
    font-weight:bold;
    margin:10px;
}

button{
    font-size:20px;
    padding:10px 20px;
    margin:5px;
}

.reset{
    margin-top:30px;
}

</style>

</head>

<body>

<h1>Shadowverse Token Counter β</h1>

<h2>ナイトメア</h2>

<h3>カード効果</h3>
<button onclick="useCard('カースパーティー')">
カースパーティー
</button>
<div id="tokens"></div>

<button class="reset" onclick="resetAll()">
全リセット
</button>

<script>

const tokenNames = [
    "ゴースト",
    "バット",
    "スケルトン",
    "腐臭のゾンビ"
];
    
const cards = {
    "カースパーティー": {
        "ゴースト": 1,
        "スケルトン": 1,
        "腐臭のゾンビ": 1
    }
};
    
let tokenCounts =
    JSON.parse(
        localStorage.getItem("tokenCounts")
    ) || {};

function saveData(){

    localStorage.setItem(
        "tokenCounts",
        JSON.stringify(tokenCounts)
    );
}

function updateDisplay(name){

    document.getElementById(
        "count-" + name
    ).textContent =
        tokenCounts[name];
}

function increase(name){

    tokenCounts[name]++;

    updateDisplay(name);

    saveData();
}

function decrease(name){

    if(tokenCounts[name] > 0){

        tokenCounts[name]--;

        updateDisplay(name);

        saveData();
    }
}

function createTokenCard(name){

    if(tokenCounts[name] == null){

        tokenCounts[name] = 0;
    }

    let html = `
        <div class="token-card">

            <h3>${name}</h3>

            <button onclick="decrease('${name}')">
                -
            </button>

            <span
                class="count"
                id="count-${name}">
                ${tokenCounts[name]}
            </span>

            <button onclick="increase('${name}')">
                +
            </button>

        </div>
    `;

    document.getElementById("tokens")
        .insertAdjacentHTML(
            "beforeend",
            html
        );
}

function resetAll(){

    tokenNames.forEach(name => {

        tokenCounts[name] = 0;

        updateDisplay(name);

    });

    saveData();
}

tokenNames.forEach(createTokenCard);

saveData();

function useCard(cardName){

    let effects = cards[cardName];

    for(let token in effects){

        tokenCounts[token] += effects[token];

        updateDisplay(token);
    }

    saveData();
}
    
</script>

</body>
</html>
